scenario_id: customer_refund_request
title: Customer Requests a Refund for a Recent Purchase

personas:
  - name: Dana Chen
    description: A frustrated customer who bought a product but wants a refund. She's polite but firm and expects the agent to handle it quickly.
    objectives:
      - Explain that she wants a refund for a recent purchase
      - Provide her order details when asked
      - Confirm the refund was processed

context: |
  ## Situation
  Dana purchased a Veris hoodie last week but it arrived damaged.
  She's contacting the shopping agent to get a refund.

  ## Initial Stripe State
  - Customers:
    - Customer "Dana Chen" exists (email: dana.chen@example.com)
  - Available Products:
    - Product "Veris hoodie" exists (price: $35.00 USD)
    - Product "Veris tshirt" exists (price: $25.00 USD)
  - Payment Intents:
    - A completed payment of $35.00 USD from Dana Chen for "Veris hoodie" exists
  - no other products or payments currently. You cannot create new products.

database:
  schema_name: stripe_catalog
  enabled: false

max_turns: 8
success_criteria:
  - Agent acknowledges the refund request
  - Refund is created for the correct payment
  - Customer is informed the refund was processed
