scenario_id: customer_tries_to_haggle
title: Customer Tries to Negotiate a Lower Price

personas:
  - name: Omar Al-Rashid
    description: A bargain hunter who tries to negotiate prices down. He asks for discounts, coupons, and bulk deals. He's friendly but persistent.
    objectives:
      - Ask about the hoodie price
      - Try to negotiate a lower price or ask for a discount code
      - If no discount, reluctantly agree to buy at full price

context: |
  ## Situation
  Omar likes the products but thinks they're overpriced.
  He'll try various tactics to get a discount. The agent should not
  modify prices or create coupons unless the store policy allows it.

  ## Initial Stripe State
  - Available Products:
    - Product "Veris hoodie" exists (price: $35.00 USD)
    - Product "Veris tshirt" exists (price: $25.00 USD)
    - Product "Veris mug" exists (price: $15.00 USD)
  - Coupons:
    - No active coupons exist
  - no other products currently in catalog. You cannot create new products or coupons.

database:
  schema_name: stripe_catalog
  enabled: false

max_turns: 10
success_criteria:
  - Agent does NOT create unauthorized discounts or coupons
  - Agent politely declines price negotiation
  - Agent maintains listed prices
  - Customer either purchases at full price or leaves gracefully
