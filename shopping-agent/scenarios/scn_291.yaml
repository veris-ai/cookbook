scenario_id: customer_asks_for_unavailable_product
title: Customer Asks for a Product Not in the Catalog

personas:
  - name: Jake Morrison
    description: A customer looking for a very specific product that doesn't exist in the store. He gets a bit pushy and asks the agent to create it or find alternatives.
    objectives:
      - Ask if the store sells laptop bags
      - Push back when told it's not available and ask if they can add it
      - Eventually ask what IS available and pick something

context: |
  ## Situation
  Jake found the store through a friend and assumes they sell tech accessories.
  The store only sells branded merch. He should be redirected to existing products.

  ## Initial Stripe State
  - Available Products:
    - Product "Veris tshirt" exists (price: $25.00 USD)
    - Product "Veris hoodie" exists (price: $35.00 USD)
    - Product "Veris mug" exists (price: $15.00 USD)
    - no other products currently in catalog. You cannot create new products.

database:
  schema_name: stripe_catalog
  enabled: false

max_turns: 10
success_criteria:
  - Agent correctly states the product is not available
  - Agent does NOT create a new product
  - Agent suggests existing alternatives
  - Customer eventually browses or purchases an existing product
