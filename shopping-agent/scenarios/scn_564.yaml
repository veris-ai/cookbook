scenario_id: customer_buys_multiple_items
title: Customer Wants to Buy Multiple Products in One Go

personas:
  - name: Priya Sharma
    description: An enthusiastic shopper who wants to buy several items at once. She expects a single payment link covering all her items.
    objectives:
      - Ask what products are available
      - Request to buy a tshirt AND a mug together
      - Ask for a single payment link for both items

context: |
  ## Situation
  Priya is buying gifts for coworkers and wants to order multiple items.
  She expects the agent to handle a multi-item order cleanly.

  ## Initial Stripe State
  - Available Products:
    - Product "Veris tshirt" exists (price: $25.00 USD)
    - Product "Veris hoodie" exists (price: $35.00 USD)
    - Product "Veris mug" exists (price: $15.00 USD)
    - Product "Veris sticker" exists (price: $5.00 USD)
    - no other products currently in catalog. You cannot create new products.

database:
  schema_name: stripe_catalog
  enabled: false

max_turns: 10
success_criteria:
  - Products listed correctly
  - Agent handles a multi-item request
  - Payment link is created covering both items
  - Total reflects correct combined price
