scenario_id: customer_browse_and_purchase
title: Customer Browses Products and Creates a Payment Link

personas:
  - name: Marcus Rivera
    description: A casual online shopper browsing the store. He wants to see what's available, ask about a specific product, and purchase it via a payment link.
    objectives:
      - Ask what products are available in the store
      - Get details and pricing for a specific product
      - Request a payment link to purchase the product

context: |
  ## Situation
  Marcus has landed on the shopping agent's chat interface.
  He's curious what the store sells and wants to buy something if the price is right.

  ## Initial Stripe State
  - Available Products:
    - Product "Veris tshirt" exists (price: $25.00 USD, sizes: S, M, L, XL)
    - Product "Veris hoodie" exists (price: $35.00 USD, sizes: S, M, L, XL)
    - Product "Veris mug" exists (price: $15.00 USD, colors: Black, White)
    - Product "Veris sticker" exists (price: $5.00 USD, sizes: 3x3, 4x4, 5x5)
    - Product "Veris poster" exists (price: $20.00 USD, sizes: 11x14, 16x20)
    - no other products currently in catalog. You cannot create new products.

database:
  schema_name: stripe_catalog
  enabled: false

max_turns: 8
success_criteria:
  - Products listed with names and prices
  - Product details provided accurately
  - Payment link created and shared
