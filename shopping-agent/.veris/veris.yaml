shopping-agent-env:
  services:
    - name: mcp/stripe
      dns_aliases:
        - mcp.stripe.com
    - name: postgres
      config:
        SCHEMA_PATH: /agent/schemas/schema.sql

  actor:
    channels:
      - type: ws
        url: ws://localhost:8000

  agent:
    code_path: /agent
    entry_point: node src/index.js
    port: 8000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/veris
      STRIPE_SECRET_KEY: sk_test_mock
      OPENAI_API_KEY: mock-openai-key
      GOOGLE_API_KEY: mock-google-key
