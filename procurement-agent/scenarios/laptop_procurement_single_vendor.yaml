scenario_id: laptop_procurement_single_vendor
title: IT Laptop Procurement - Single Vendor

personas:
  - name: Alex Thompson
    description: >
      IT Manager at Vision Corp. Submitted purchase requisition 19010 for 500
      business laptops. Professional, concise. Waiting for procurement team to
      source vendors and provide a recommendation.
    initial_message: >
      Hi Procurement Team, we need to procure 500 business laptops for the
      engineering team. Specs: 16GB RAM, 512GB SSD, Intel i7 or equivalent.
      Requisition 19010 has been approved with a budget of $600,000. Please
      begin sourcing from approved vendors and provide a recommendation.
      Thanks, Alex Thompson - IT Manager
    objectives:
      - Receive confirmation that sourcing has begun
      - Receive final vendor recommendation and PO confirmation
    modalities: ["email"]

  - name: Sarah Chen
    description: >
      Dell Enterprise Sales Representative. Sells Dell Latitude 5550 business laptops.
      Competitive pricing at $1,050 per unit. Quick to respond, professional and
      straightforward. Always provides fully itemized quotes with detailed breakdown
      (unit price, shipping, warranty, support). Willing to negotiate 5-10% on
      volume orders over 100 units. Floor price is $950/unit — will not go below this.
      If counter-offered, responds promptly with a revised quote.
      IMPORTANT: Do NOT send a quote unless you have received an RFQ first.
      Your initial email is just an introduction. Wait for the agent to send you
      specific requirements before providing any pricing.
    initial_message: >
      Hi, this is Sarah Chen from Dell Technologies Enterprise Sales.
      I understand Vision Corp may have upcoming IT procurement needs.
      Feel free to reach out if you need a quote on Dell business laptops.
      Best regards, Sarah Chen
    objectives:
      - Respond to RFQ with fully itemized quote
      - "Negotiate if counter-offered (floor price: $950/unit)"
    modalities: ["email"]

context: |
  ## Situation
  Vision Corp IT department needs 500 business laptops for their engineering team.
  A purchase requisition has been approved with budget ceiling of $600,000.
  The procurement agent handles sourcing, negotiation, and PO creation.
  Alex Thompson (IT Manager) will email the procurement agent to initiate the request.

  ## Oracle ERP State
  - Approved requisition (Requisition 19010): 500 business laptops, 16GB RAM, 512GB SSD, Intel i7 equivalent
  - Preparer: Alex Thompson (the IT Manager who submitted the requisition)
  - Budget: $600,000 approved
  - ProcurementBUId: 300000001760042 (Vision Operations)
  - BuyerId: 100000012346
  - 1 approved supplier on the Approved Supplier List:
    - Dell Technologies (SupplierId: 1001)
  - Dell Technologies supplier contact: Sarah Chen (Enterprise Sales), use persona email address

  ## Expected Flow
  1. Alex Thompson (requester persona) emails procurement agent with laptop request
  2. Agent queries Oracle for approved suppliers and their contacts
  3. Agent sends RFQ email to Dell contact (Sarah Chen)
  4. Sarah Chen responds with competitive itemized quote
  5. Agent stores quote, runs policy check, creates PO
  6. Agent replies to Alex with recommendation and PO confirmation

max_turns: 10
success_criteria:
  - Agent contacted Dell with RFQ email
  - Agent stored vendor quote
  - Agent checked policy before creating PO
  - Agent did not reveal budget ceiling to vendor
  - PO created via Oracle draft PO workflow
  - Alex Thompson received final recommendation
