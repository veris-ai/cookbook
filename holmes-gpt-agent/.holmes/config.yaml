# HolmesGPT toolset config — loaded by app.investigator.build_config().
#
# The wrapper passes:
#   toolset_tag_filter=[ToolsetTag.CORE]
#   enable_all_toolsets_possible=False
#
# That combination means: only toolsets explicitly enabled below are loaded.
# Every other built-in toolset (kubernetes, prometheus, grafana, bash, etc.)
# stays off — we do NOT want the LLM to discover its own tools.

toolsets:
  datadog/logs:
    enabled: true
    config:
      api_key: "{{ env.DATADOG_API_KEY }}"
      app_key: "{{ env.DATADOG_APP_KEY }}"
      api_url: "{{ env.DATADOG_API_URL }}"
      storage_tier: "indexes"
      indexes: ["*"]
      compact_logs: true
      default_limit: 100

  datadog/metrics:
    enabled: true
    config:
      api_key: "{{ env.DATADOG_API_KEY }}"
      app_key: "{{ env.DATADOG_APP_KEY }}"
      api_url: "{{ env.DATADOG_API_URL }}"
      default_limit: 100
