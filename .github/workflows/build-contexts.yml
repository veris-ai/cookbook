name: Build Cookbook Templates

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gvisor_base:
        description: "Base image override (e.g. from sandbox prod push)"
        required: false

env:
  GCS_BUCKET: veris-sandbox-blob-storage-dev
  GCS_PREFIX: templates
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/veris-sandbox

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push cookbook images
        run: |
          BASE="${{ inputs.gvisor_base || format('{0}/veris-gvisor:latest', env.ARTIFACT_REGISTRY) }}"
          echo "Using base image: $BASE"

          for dir in */; do
            if [ -f "$dir/.veris/Dockerfile.sandbox" ]; then
              ID="${dir%/}"
              TAG="${{ env.ARTIFACT_REGISTRY }}/cookbook-${ID}:latest"
              echo "Building $ID → $TAG"
              docker build -f "$dir/.veris/Dockerfile.sandbox" --build-arg GVISOR_BASE="$BASE" -t "$TAG" "$dir"
              docker push "$TAG"
            fi
          done

      - name: Build contexts and manifest
        run: python .github/scripts/build_contexts.py
        env:
          ARTIFACT_REGISTRY: ${{ env.ARTIFACT_REGISTRY }}

      - name: Upload to GCS
        run: |
          gsutil -m cp -r dist/contexts/* gs://${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/contexts/
          gsutil cp dist/manifest.json gs://${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/manifest.json
          echo "Uploaded $(ls dist/contexts/*.tar.gz | wc -l) template contexts + manifest"
