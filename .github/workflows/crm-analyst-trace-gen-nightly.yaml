name: "Veris: crm-analyst Trace-Gen Nightly"

on:
  schedule:
    - cron: '0 7 * * *'      # 07:00 UTC, after the 06:00 cookbook nightlies
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of production traces to ground on"
        default: "3"
        required: false
      num_scenarios:
        description: "Number of scenarios to generate"
        default: "30"
        required: false

permissions:
  contents: read
  id-token: write            # required for GCP Workload Identity Federation

env:
  # --- Per-agent (hardcoded so the repo can host one *-trace-gen-nightly.yaml per
  # agent; GitHub repo Variables are repo-global). Not secrets — the real creds
  # live in GCP Secret Manager, pulled below by these names. ---
  VERIS_ENV_ID: "env_5e5n3vezipnngaqvygtki"
  LANGFUSE_HOST: "https://us.cloud.langfuse.com"
  SECRET_LANGFUSE_PUBLIC_KEY: "crm-analyst-langfuse-public-key"   # per-agent Langfuse project
  SECRET_LANGFUSE_SECRET_KEY: "crm-analyst-langfuse-secret-key"
  # Shared across ALL cookbook nightlies: a dedicated is_admin *automation* user's
  # key (trace sources are admin-gated — see backend scenario_sources.py). This is
  # the same auth model the onboard/training/grading pods use (system veris-api-key
  # bearer), but a separate bot identity so its blast radius is isolated to CI.
  SECRET_VERIS_ADMIN_API_KEY: "veris-cookbook-nightly-admin-key"
  # --- Tunables (overridable via workflow_dispatch) ---
  LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '3' }}
  NUM_SCENARIOS: ${{ github.event.inputs.num_scenarios || '30' }}
  TRACE_NAME_FILTER: "openclaw.run"
  FOCUS_PROMPT: >-
    Ground scenarios on real crm-analyst production turns: PostHog analytics
    questions asked over Slack, HogQL queries, and email drafts that require
    human approval before sending. Prefer genuine user analytics requests over
    automated liveness or heartbeat pings.

jobs:
  trace-gen-sim:
    runs-on: ubuntu-latest
    environment: veris-sandbox-ci
    defaults:
      run:
        working-directory: crm-analyst-agent/trace-gen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install veris-cli
        # The --from-langfuse flag (PR #171) ships in veris-cli 2.30.0+. veris-cli
        # is a PRIVATE repo, so install from public PyPI (not git) — same as the
        # sibling cookbook nightlies. Requires the 2.30.0 release to be published
        # first via veris-cli's release.yml (semantic-release bumps 2.29.0→2.30.0).
        run: pip install "veris-cli>=2.30.0,<3"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Pull credentials from Secret Manager
        run: |
          set -euo pipefail
          while IFS=: read -r var secret; do
            [ -n "$var" ] || continue
            val="$(gcloud secrets versions access latest --secret="$secret")"
            echo "::add-mask::$val"
            echo "$var=$val" >> "$GITHUB_ENV"
          done <<EOF
          VERIS_API_KEY:$SECRET_VERIS_ADMIN_API_KEY
          LANGFUSE_PUBLIC_KEY:$SECRET_LANGFUSE_PUBLIC_KEY
          LANGFUSE_SECRET_KEY:$SECRET_LANGFUSE_SECRET_KEY
          EOF

      - name: Generate scenario set from production traces
        run: |
          set -euo pipefail
          veris login "$VERIS_API_KEY" >/dev/null
          chmod +x build_langfuse_curl.sh

          OUT="$(./build_langfuse_curl.sh | veris scenarios create \
                   --env-id "$VERIS_ENV_ID" \
                   --from-langfuse - \
                   --num "$NUM_SCENARIOS" \
                   --title "crm-analyst-trace-nightly-${LOOKBACK_DAYS}d-$(date -u +%Y%m%d)" \
                   --prompt "$FOCUS_PROMPT" 2>&1)"
          echo "$OUT"

          SET_ID="$(echo "$OUT" | grep -oE 'scenset_[a-z0-9]+' | head -1)"
          [ -n "$SET_ID" ] || { echo "::error::No scenario set id in output — generation launch failed."; exit 1; }
          echo "SET_ID=$SET_ID" >> "$GITHUB_ENV"
          echo "::notice::Generating scenario set $SET_ID"

      - name: Wait for generation to finish
        run: veris scenarios status "$SET_ID" --watch

      - name: Run simulation + evaluation
        run: |
          set -euo pipefail
          # The grader is generated shortly AFTER the set reports `ready`, so the
          # first `veris run` can transiently hit "No grader found". That check
          # runs *before* any sim run is created (veris-cli run.py:86-101), so
          # retrying is safe — no duplicate sims. Retry only on that transient;
          # any other failure fails the job loudly.
          attempts=0
          until veris run \
                  --scenario-set-id "$SET_ID" \
                  --env-id "$VERIS_ENV_ID" \
                  --simulation-timeout 900 \
                  > veris-summary.md 2> run.log; do
            if grep -q "No grader found" run.log && [ "$attempts" -lt 12 ]; then
              attempts=$((attempts + 1))
              echo "::notice::grader not ready yet (attempt $attempts/12) — waiting 15s"
              sleep 15
            else
              cat run.log >&2
              echo "::error::veris run failed"
              exit 1
            fi
          done
          cat run.log >&2 || true
          cat veris-summary.md

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veris-summary
          path: crm-analyst-agent/trace-gen/veris-summary.md
          if-no-files-found: ignore
