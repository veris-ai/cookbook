name: "Veris: crm-analyst Improvement Loop (Reference)"

# REFERENCE COPY — the production loop runs from a private mirror.
#
# Self-closing nightly improvement loop:
#   rebuild prod env  ->  generate scenarios from fresh prod traces
#   ->  run + grade  ->  report  ->  ingest agent-fixes into a DRAFT PR.
# Merging the PR is the human gate; the NEXT nightly rebuilds prod from the merged
# HEAD and re-measures on fresh prod-grounded scenarios — no separate verify job.
#
# Why no cron here: the loop's outputs — report text, sim transcripts, fix
# diffs, run logs, artifacts — quote production data, and a public repo makes
# every one of those a public surface. We run this exact loop against our
# production agent from a private repo (where the auto-fix PRs also land) and
# cherry-pick sanitized improvements back into this showcase copy. The private
# variant's rebuild step also sources the env's runtime user-state from GCS
# (it carries credentials that can never live in a git repo, public or not).

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of production traces to ground on"
        default: "5"
        required: false
      num_scenarios:
        description: "Number of scenarios to generate"
        default: "30"
        required: false

permissions:
  contents: write            # push the agent-fix branch
  pull-requests: write       # open the draft PR
  id-token: write            # GCP Workload Identity Federation

env:
  # The agent's Veris env id — sourced from a per-agent GitHub Actions Variable
  # (repo Variables are repo-global, so each agent uses its own name) and kept out
  # of this public file.
  VERIS_ENV_ID: ${{ vars.CRM_ANALYST_ENV_ID }}
  LANGFUSE_HOST: "https://us.cloud.langfuse.com"
  # GCP Secret Manager secret *names* (not values), pulled below — map to your own.
  SECRET_LANGFUSE_PUBLIC_KEY: "crm-analyst-langfuse-public-key"
  SECRET_LANGFUSE_SECRET_KEY: "crm-analyst-langfuse-secret-key"
  # A dedicated is_admin *automation* user's key — trace sources are admin-gated.
  SECRET_VERIS_ADMIN_API_KEY: "veris-cookbook-nightly-admin-key"
  # --- Tunables (overridable via workflow_dispatch) ---
  LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '5' }}
  NUM_SCENARIOS: ${{ github.event.inputs.num_scenarios || '30' }}
  TRACE_NAME_FILTER: "openclaw.run"
  FOCUS_PROMPT: >-
    Ground scenarios on real crm-analyst production turns: PostHog analytics
    questions asked over Slack, HogQL queries, and email drafts that require
    human approval before sending. Prefer genuine user analytics requests over
    automated liveness or heartbeat pings.

jobs:
  improve:
    runs-on: ubuntu-latest
    environment: veris-sandbox-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install veris-cli
        # reports get --format json + env config pull / push --no-snapshot need
        # veris-cli 2.32.0+.
        run: pip install "veris-cli>=2.32.0,<3"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Pull credentials from Secret Manager
        run: |
          set -euo pipefail
          while IFS=: read -r var secret; do
            [ -n "$var" ] || continue
            val="$(gcloud secrets versions access latest --secret="$secret")"
            echo "::add-mask::$val"
            echo "$var=$val" >> "$GITHUB_ENV"
          done <<EOF
          VERIS_API_KEY:$SECRET_VERIS_ADMIN_API_KEY
          LANGFUSE_PUBLIC_KEY:$SECRET_LANGFUSE_PUBLIC_KEY
          LANGFUSE_SECRET_KEY:$SECRET_LANGFUSE_SECRET_KEY
          EOF

      - name: Veris login
        run: veris login "$VERIS_API_KEY" >/dev/null

      - name: Rebuild prod env from repo HEAD
        working-directory: crm-analyst-agent
        # Make tonight's sims run the agent as it exists in the repo right now — so a
        # previously-merged agent-fix PR actually takes effect. config pull materializes
        # .veris/ (Dockerfile.sandbox + veris.yaml); env push --no-snapshot does a
        # server-side Cloud Build from the on-disk agent source (no local docker).
        # NOTE: requires the agent dir to be env-push-able (a user-state baseline).
        # Validate via workflow_dispatch before trusting the cron.
        run: |
          set -euo pipefail
          veris env config pull --env-id "$VERIS_ENV_ID"
          veris env push --no-snapshot --env-id "$VERIS_ENV_ID"

      - name: Generate scenario set from production traces
        working-directory: crm-analyst-agent/trace-gen
        run: |
          set -euo pipefail
          chmod +x build_langfuse_curl.sh
          OUT="$(./build_langfuse_curl.sh | veris scenarios create \
                   --env-id "$VERIS_ENV_ID" \
                   --from-langfuse - \
                   --num "$NUM_SCENARIOS" \
                   --title "crm-analyst-trace-nightly-${LOOKBACK_DAYS}d-$(date -u +%Y%m%d)" \
                   --prompt "$FOCUS_PROMPT" 2>&1)"
          echo "$OUT"
          SET_ID="$(echo "$OUT" | grep -oE 'scenset_[a-z0-9]+' | head -1)"
          [ -n "$SET_ID" ] || { echo "::error::No scenario set id in output — generation launch failed."; exit 1; }
          echo "SET_ID=$SET_ID" >> "$GITHUB_ENV"
          echo "::notice::Generating scenario set $SET_ID"

      - name: Wait for generation to finish
        working-directory: crm-analyst-agent/trace-gen
        run: veris scenarios status "$SET_ID" --watch

      - name: Run simulation + evaluation
        working-directory: crm-analyst-agent/trace-gen
        run: |
          set -euo pipefail
          # grader is generated shortly AFTER the set reports `ready`, so the first
          # `veris run` can transiently hit "No grader found" (before any sim is
          # created — retry is safe). Any other failure fails the job loudly.
          attempts=0
          until veris run \
                  --scenario-set-id "$SET_ID" \
                  --env-id "$VERIS_ENV_ID" \
                  --simulation-timeout 900 \
                  > veris-summary.md 2> run.log; do
            if grep -q "No grader found" run.log && [ "$attempts" -lt 12 ]; then
              attempts=$((attempts + 1)); echo "::notice::grader not ready (attempt $attempts/12)"; sleep 15
            else
              cat run.log >&2; echo "::error::veris run failed"; exit 1
            fi
          done
          cat veris-summary.md
          RUN_ID="$(grep -oE 'run_[a-z0-9]+' veris-summary.md | head -1)"
          [ -n "$RUN_ID" ] || { echo "::error::no run id in summary"; exit 1; }
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

      - name: Generate report + fetch agent-fixes
        working-directory: crm-analyst-agent/trace-gen
        run: |
          set -euo pipefail
          RPT="$(veris reports create "$RUN_ID" 2>&1 | grep -oE 'rpt_[a-z0-9]+' | head -1)"
          [ -n "$RPT" ] || { echo "::error::report create failed"; exit 1; }
          echo "REPORT_ID=$RPT" >> "$GITHUB_ENV"
          echo "::notice::report $RPT — polling for agent-fixes"
          # /agent-fixes 409s until the report is `completed`; poll the JSON export.
          for _ in $(seq 1 60); do
            if veris reports get "$RPT" --format json -o fixes.json 2>/dev/null && [ -s fixes.json ]; then
              echo "::notice::agent-fixes ready"; exit 0
            fi
            sleep 15
          done
          echo "::error::report $RPT did not complete in time"; exit 1

      - name: Ingest agent-fixes → draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Exit codes: 0 = >=1 fix applied (open PR); 2 = fixes found but all failed
          # to apply (baseline drift — surface, don't call it clean); 1 = nothing fixable.
          PR_BODY=crm-analyst-agent/trace-gen/pr_body.md
          rc=0
          python crm-analyst-agent/improve/ingest_report.py \
            --fixes crm-analyst-agent/trace-gen/fixes.json \
            --agent-dir crm-analyst-agent \
            --repo-root . \
            --pr-body "$PR_BODY" || rc=$?
          if [ "$rc" -eq 1 ]; then
            echo "::notice::No agent-fixable suggestions tonight — loop is clean."
            exit 0
          fi
          if [ "$rc" -eq 2 ]; then
            echo "::warning::Agent-fixable suggestions were found but all failed to apply (baseline drift). See the pr_body in the run-summary artifact and apply by hand."
            exit 0
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::error::ingest_report.py failed (rc=$rc)"; exit 1
          fi
          # rc == 0: at least one fix applied → open a draft PR. Stage ONLY agent
          # source — exclude the trace-gen run artifacts (fixes.json, summaries,
          # pr_body) and the env config materialized by `env config pull` (.veris).
          BR="auto/crm-analyst-fixes-$(date -u +%Y%m%dT%H%M%S)"
          git config user.name "veris-cookbook-bot"
          git config user.email "veris-cookbook-bot@users.noreply.github.com"
          git checkout -b "$BR"
          git add -- crm-analyst-agent ':(exclude)crm-analyst-agent/trace-gen' ':(exclude)crm-analyst-agent/.veris'
          git diff --cached --quiet && { echo "::error::ingest applied fixes but nothing staged"; exit 1; }
          git commit -m "fix(crm-analyst): ingest agent-fixes from report ${REPORT_ID}"
          git push -u origin "$BR"
          gh pr create --draft --base main --head "$BR" \
            --title "fix(crm-analyst): nightly agent-fixes from ${REPORT_ID}" \
            --body-file "$PR_BODY"

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veris-summary
          path: |
            crm-analyst-agent/trace-gen/veris-summary.md
            crm-analyst-agent/trace-gen/fixes.json
            crm-analyst-agent/trace-gen/pr_body.md
          if-no-files-found: ignore
